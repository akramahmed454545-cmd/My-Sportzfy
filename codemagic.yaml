# Codemagic CI/CD Configuration for Sportzfy Android App
# This file is optimized to build debug and release APKs seamlessly.

workflows:
  android-apk-build:
    name: Sportzfy Android APK Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        # Define these variables in your Codemagic dashboard if you wish to sign your release APK:
        # - keystore_credentials
        - play_store_credentials
      vars:
        JAVA_VERSION: "21"
      node: latest
    triggering:
      events:
        - push
        - pull_request
        - tag
      branch_patterns:
        - pattern: '*'
          include: true
          source: true
    scripts:
      - name: Set up Java JDK 21
        script: |
          echo "Setting up Java Development Kit..."
          # Switch to JDK 21 if using mac_mini_m1 or custom runners
          sdk use java 21.0.2-tem || sdk use java 21-open || java -version
          
      - name: Decode Debug Keystore
        script: |
          echo "Decoding keystore files..."
          if [ -f debug.keystore.base64 ]; then
            base64 -d debug.keystore.base64 > debug.keystore
            echo "Successfully decoded local debug.keystore.base64"
          elif [ -n "$CM_KEYSTORE" ]; then
            echo "$CM_KEYSTORE" | base64 --decode > debug.keystore
            echo "Successfully decoded CM_KEYSTORE from environment variables"
          else
            echo "Using default debug.keystore if available, or Gradle will auto-generate one."
          fi

      - name: Initialize Environment & Secrets Config
        script: |
          echo "Setting up env files..."
          if [ ! -f .env ]; then
            cp .env.example .env
            echo "Created .env from .env.example template."
          fi

      - name: Build Android App (APK)
        script: |
          echo "Initializing Build..."
          # If gradle wrapper is missing, we generate it to ensure maximum portability
          if [ ! -f gradlew ]; then
            echo "No Gradle wrapper found. Attempting to generate one using system gradle..."
            gradle wrapper || true
          fi
          
          if [ -f gradlew ]; then
            chmod +x gradlew
            echo "Building Debug APK using Gradlew..."
            ./gradlew :app:assembleDebug --stacktrace
            
            echo "Building Release APK using Gradlew..."
            # Release build might fail if signing keys are not fully configured.
            # We use continue-on-error behavior to ensure the workflow succeeds if debug builds are ready.
            ./gradlew :app:assembleRelease --stacktrace || echo "Warning: Release build failed. Ensure your release signing credentials are correct."
          else
            echo "Falling back to system gradle command..."
            gradle :app:assembleDebug --stacktrace
            gradle :app:assembleRelease --stacktrace || echo "Warning: Release build failed. Ensure your release signing credentials are correct."
          fi

    artifacts:
      - app/build/outputs/apk/**/*.apk

    publishing:
      email:
        recipients:
          - akramahmed454545@gmail.com
        notifying:
          on_success: true
          on_failure: true
