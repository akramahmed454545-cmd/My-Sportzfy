<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Intense neon pink glow -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <!-- Rounded container with theme background -->
  <rect width="512" height="512" rx="128" fill="#070b13" />
  
  <!-- Stylized Letter S -->
  <g transform="skewX(-10) translate(20, 0)">
    <!-- Outer Glow Behind (Pink Glow) -->
    <text x="236" y="380" 
          font-family="system-ui, -apple-system, 'Impact', 'Arial Black', sans-serif" 
          font-size="390" 
          font-weight="900" 
          fill="#FF007F" 
          text-anchor="middle"
          filter="url(#neonGlow)">S</text>
          
    <!-- Sharp Front Face (Cyan with Pink stroke outline) -->
    <text x="236" y="380" 
          font-family="system-ui, -apple-system, 'Impact', 'Arial Black', sans-serif" 
          font-size="390" 
          font-weight="900" 
          fill="#00E5FF" 
          stroke="#FF007F"
          stroke-width="12"
          stroke-linejoin="round"
          text-anchor="middle">S</text>
  </g>
</svg>
